name: DevOps CI/CD

permissions:
  id-token: write
  contents: read
  packages: write

on:
  push:
    branches: [main]
  pull_request:

jobs:
  ci:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: backend/package-lock.json
      - run: npm ci
      - run: npm run lint --if-present
      - run: npm test --if-present

  build-and-push:
    runs-on: ubuntu-latest
    needs: ci
    if: github.ref == 'refs/heads/main'
    strategy:
      matrix:
        service: [gateway, wallet-service, portfolio-service]
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Normalize image owner to lowercase
        id: image_owner
        run: echo "owner=${GITHUB_REPOSITORY_OWNER,,}" >> "$GITHUB_OUTPUT"
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: backend
          file: backend/services/${{ matrix.service }}/Dockerfile
          push: true
          tags: ghcr.io/${{ steps.image_owner.outputs.owner }}/zwallet-${{ matrix.service }}:${{ github.sha }}

  deploy-blue-green:
    runs-on: ubuntu-latest
    needs: build-and-push
    if: github.ref == 'refs/heads/main'
    env:
      AWS_REGION: ap-southeast-1
      EKS_CLUSTER_NAME: zwallet-cluster
      K8S_NAMESPACE: default
    steps:
      - uses: actions/checkout@v4
      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::171518635073:role/github-oidc-zwallet
          aws-region: ${{ env.AWS_REGION }}
      - name: Configure kubectl
        uses: azure/setup-kubectl@v4
      - name: Debug AWS identity
        run: |
          set -e
          aws sts get-caller-identity

      - name: Update kubeconfig (ephemeral)
        run: |
          set -e
          aws eks update-kubeconfig --name "$EKS_CLUSTER_NAME" --region "$AWS_REGION"
          kubectl config current-context
      - name: Verify cluster access
        run: kubectl get nodes
      - name: Deploy green
        run: |
          kubectl apply -f k8s/base -n "$K8S_NAMESPACE"
          kubectl patch service zwallet-gateway -n "$K8S_NAMESPACE" -p '{"spec":{"selector":{"app":"zwallet-gateway","track":"green"}}}'
      - name: Validate rollout
        run: kubectl rollout status deploy/zwallet-gateway -n "$K8S_NAMESPACE" --timeout=180s
      - name: Rollback on failure
        if: failure()
        run: |
          aws eks update-kubeconfig --name "$EKS_CLUSTER_NAME" --region "$AWS_REGION"
          kubectl config current-context
          kubectl rollout undo deploy/zwallet-gateway -n "$K8S_NAMESPACE"
          kubectl patch service zwallet-gateway -n "$K8S_NAMESPACE" -p '{"spec":{"selector":{"app":"zwallet-gateway","track":"blue"}}}'
