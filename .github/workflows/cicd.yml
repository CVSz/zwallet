name: DevOps CI/CD

on:
  push:
    branches: [main]
  pull_request:

jobs:
  ci:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: backend/package-lock.json
      - run: npm ci
      - run: npm run lint --if-present
      - run: npm test --if-present

  build-and-push:
    runs-on: ubuntu-latest
    needs: ci
    if: github.ref == 'refs/heads/main'
    strategy:
      matrix:
        service: [gateway, wallet-service, portfolio-service]
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Normalize image owner to lowercase
        id: image_owner
        run: echo "owner=${GITHUB_REPOSITORY_OWNER,,}" >> "$GITHUB_OUTPUT"
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: backend
          file: backend/services/${{ matrix.service }}/Dockerfile
          push: true
          tags: ghcr.io/${{ steps.image_owner.outputs.owner }}/zwallet-${{ matrix.service }}:${{ github.sha }}

  deploy-blue-green:
    runs-on: ubuntu-latest
    needs: build-and-push
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - name: Configure kubectl
        uses: azure/setup-kubectl@v4
      - name: Deploy green
        run: |
          kubectl apply -f k8s/base
          kubectl patch service zwallet-gateway -p '{"spec":{"selector":{"app":"zwallet-gateway","track":"green"}}}'
      - name: Validate rollout
        run: kubectl rollout status deploy/zwallet-gateway --timeout=180s
      - name: Rollback on failure
        if: failure()
        run: |
          kubectl rollout undo deploy/zwallet-gateway
          kubectl patch service zwallet-gateway -p '{"spec":{"selector":{"app":"zwallet-gateway","track":"blue"}}}'
