name: DevOps CI/CD

permissions:
  contents: read
  packages: write

on:
  push:
    branches: [main]
  pull_request:

jobs:
  ci:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: backend/package-lock.json
      - run: npm ci
      - run: npm run lint --if-present
      - run: npm test --if-present

  build-and-push:
    runs-on: ubuntu-latest
    needs: ci
    if: github.ref == 'refs/heads/main'
    strategy:
      matrix:
        service: [gateway, wallet-service, portfolio-service]
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Normalize image owner to lowercase
        id: image_owner
        run: echo "owner=${GITHUB_REPOSITORY_OWNER,,}" >> "$GITHUB_OUTPUT"
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: backend
          file: backend/services/${{ matrix.service }}/Dockerfile
          push: true
          tags: ghcr.io/${{ steps.image_owner.outputs.owner }}/zwallet-${{ matrix.service }}:${{ github.sha }}

  deploy-blue-green:
    runs-on: ubuntu-latest
    needs: build-and-push
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - name: Configure kubectl
        uses: azure/setup-kubectl@v4
      - name: Configure kubeconfig
        id: kubeconfig
        env:
          KUBE_CONFIG: ${{ secrets.KUBE_CONFIG }}
        run: |
          if [ -z "$KUBE_CONFIG" ]; then
            echo "KUBE_CONFIG secret is not set; skipping deploy."
            echo "configured=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          mkdir -p "$HOME/.kube"
          if echo "$KUBE_CONFIG" | base64 --decode > "$HOME/.kube/config" 2>/dev/null; then
            echo "Kubeconfig decoded from base64 secret."
          else
            echo "$KUBE_CONFIG" > "$HOME/.kube/config"
            echo "Kubeconfig written as plaintext secret."
          fi

          chmod 600 "$HOME/.kube/config"
          kubectl cluster-info
          echo "configured=true" >> "$GITHUB_OUTPUT"
      - name: Deploy green
        if: steps.kubeconfig.outputs.configured == 'true'
        run: |
          kubectl apply -f k8s/base
          kubectl patch service zwallet-gateway -p '{"spec":{"selector":{"app":"zwallet-gateway","track":"green"}}}'
      - name: Validate rollout
        if: steps.kubeconfig.outputs.configured == 'true'
        run: kubectl rollout status deploy/zwallet-gateway --timeout=180s
      - name: Rollback on failure
        if: failure() && steps.kubeconfig.outputs.configured == 'true'
        run: |
          kubectl rollout undo deploy/zwallet-gateway
          kubectl patch service zwallet-gateway -p '{"spec":{"selector":{"app":"zwallet-gateway","track":"blue"}}}'
