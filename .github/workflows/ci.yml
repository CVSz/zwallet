name: ci
on: [push, pull_request]
jobs:
  api:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.12' }
      - run: pip install fastapi uvicorn pydantic-settings sqlalchemy asyncpg pyjwt passlib[bcrypt] web3 slowapi python-multipart
      - run: python -m py_compile api/app/main.py
