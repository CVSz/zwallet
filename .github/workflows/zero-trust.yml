# .github/workflows/zero-trust.yml
name: Zero Trust Supply Chain

on:
  push:
    branches: ["main"]

jobs:
  secure-build:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and Push Image
        id: build
        run: |
          IMAGE=ghcr.io/${{ github.repository }}/api:secure
          docker build -t $IMAGE ./api
          docker push $IMAGE

      - name: Get Image Digest
        id: digest
        run: |
          DIGEST=$(docker inspect --format='{{index .RepoDigests 0}}' ghcr.io/${{ github.repository }}/api:secure)
          echo "digest=$DIGEST" >> $GITHUB_OUTPUT

      - name: Scan Image (Trivy)
        uses: aquasecurity/trivy-action@v0.24.0
        with:
          image-ref: ${{ steps.digest.outputs.digest }}
          severity: CRITICAL,HIGH
          exit-code: 1

      - name: Generate SBOM
        uses: anchore/sbom-action@v0.15.3
        with:
          image: ${{ steps.digest.outputs.digest }}
          format: cyclonedx-json
          output-file: sbom.json

      - name: Cosign Install
        uses: sigstore/cosign-installer@v3

      - name: Sign Image (Keyless)
        env:
          COSIGN_EXPERIMENTAL: "true"
        run: |
          cosign sign ${{ steps.digest.outputs.digest }}

      - name: Attest SBOM
        run: |
          cosign attest --predicate sbom.json --type cyclonedx ${{ steps.digest.outputs.digest }}

      - name: Verify Signature
        run: |
          cosign verify ${{ steps.digest.outputs.digest }}
