name: AWS Test (No Cost)

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Login AWS via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::171518635073:role/github-oidc-zwallet
          aws-region: ap-southeast-1

      - name: Verify identity
        run: aws sts get-caller-identity

      - name: Safe command (no cost)
        run: aws iam list-roles
