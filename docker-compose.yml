services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: zwallet
      POSTGRES_USER: zwallet
      POSTGRES_PASSWORD: zwallet
    ports: ['5432:5432']

  redis:
    image: redis:7-alpine
    ports: ['6379:6379']

  nats:
    image: nats:2.11-alpine
    command: ["-js"]
    ports: ['4222:4222']

  gateway:
    image: node:22-alpine
    working_dir: /app
    volumes:
      - ./backend:/app
    command: sh -c "npm install && npm run dev --workspace=@zwallet/gateway"
    ports: ['8080:8080']
    depends_on: [postgres, redis, nats]
