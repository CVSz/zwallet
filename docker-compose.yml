services:
  db:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: zwallet
      POSTGRES_USER: zwallet
      POSTGRES_PASSWORD: zwallet
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U zwallet"]
      interval: 5s
      timeout: 5s
      retries: 10
  api:
    build: ./api
    environment:
      SECRET_KEY: change_me_in_prod
      DATABASE_URL: postgresql+asyncpg://zwallet:zwallet@db:5432/zwallet
      ETHEREUM_RPC_URL: https://ethereum-rpc.publicnode.com
      ENVIRONMENT: development
    ports: ["8080:8080"]
    depends_on:
      db:
        condition: service_healthy
